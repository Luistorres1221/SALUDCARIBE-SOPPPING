version: '3.8'

services:
  mysql:
    image: mysql:8.0-alpine
    container_name: salud_caribe_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: salud_caribe_db
      MYSQL_USER: salud_user
      MYSQL_PASSWORD: salud_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - salud_caribe_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: salud_caribe_backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/salud_caribe_db
      SPRING_DATASOURCE_USERNAME: salud_user
      SPRING_DATASOURCE_PASSWORD: salud_password
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: com.mysql.cj.jdbc.Driver
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.MySQL8Dialect
      SPRING_JPA_SHOW_SQL: false
      SERVER_SERVLET_CONTEXT_PATH: /api
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - salud_caribe_network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: salud_caribe_frontend
    environment:
      VITE_API_URL: http://localhost:8080/api
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - salud_caribe_network
    restart: unless-stopped

volumes:
  mysql_data:
    driver: local

networks:
  salud_caribe_network:
    driver: bridge
